# Default eval config. CLI args override these values.
dataset: null
output: null
ids: null
s3_bucket: null
s3_prefix: eval
wandb_project: null
weave_project: null

# Active provider (pass --provider on CLI to switch)
provider: gemini-3.1-pro

# Remote sandbox execution defaults for provider tool calls.
# `mode: daytona` enables remote Python/bash execution with local artifact sync.
# `runtime:` is the preferred name; `sandbox:` remains supported for compatibility.
runtime:
  type: local
  template: null
  concurrency: null

sandbox:
  mode: local
  template: null
  concurrency: null

# Judge model selection. `provider` should match an entry under `providers:`.
# The judge uses the same REPL backend as the main eval path.
judge:
  provider: gemini

# Benchmark plugins — add new benchmarks here
# module: path to Python file, class: plugin class name
benchmarks:
  kwbench:
    module: eval/benchmarks/kwbench.py
    class: KWBenchPlugin
  gsm8k:
    module: eval/benchmarks/gsm8k.py
    class: GSM8KPlugin
  terminal_bench:
    module: eval/benchmarks/terminal_bench.py
    class: TerminalBenchPlugin

# Provider configs — add new providers here
# llm: path to the LLM module
# Remaining keys are provider-specific (base_url/api_key/model for oaichat)
providers:
  # --- OpenAI-compatible (oaichat) ---
  kimi-wandb:
    llm: eval/llms/oaichat.py
    base_url: https://api.inference.wandb.ai/v1
    api_key: ${WANDB_API_KEY}
    model: moonshotai/Kimi-K2.5

  kimi:
    llm: eval/llms/oaichat.py
    base_url: https://api.moonshot.ai/v1
    api_key: ${MOONSHOT_API_KEY}
    model: kimi-k2.5

  qwen:
    llm: eval/llms/oaichat.py
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key: ${ALIBABA_KEY}
    model: qwen-plus
    extra_body:
      enable_thinking: true

  qwen3.5:
    llm: eval/llms/oaichat.py
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
